name: Android CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build, Sign & Upload
    runs-on: ubuntu-latest

    env:
      KEYSTORE_PATH: app/keystore.jks
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Build Debug APK
      - name: Build Debug APK
        run: ./gradlew clean assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NaijaTools-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk

      # Decode keystore if supplied
      - name: Decode Keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
            echo "SIGNED_BUILD=true" >> $GITHUB_ENV
          else
            echo "SIGNED_BUILD=false" >> $GITHUB_ENV
          fi

      # Build Release APK
      - name: Build Release APK
        shell: bash
        run: |
          if [ "$SIGNED_BUILD" != "true" ]; then
            echo "Skipping Release APK"
            exit 0
          fi

          ./gradlew clean assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: NaijaTools-release-apk-${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: ignore

      # Build Release Bundle
      - name: Build Release AAB
        shell: bash
        run: |
          if [ "$SIGNED_BUILD" != "true" ]; then
            echo "Skipping Release Bundle"
            exit 0
          fi

          ./gradlew bundleRelease --no-daemon

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: NaijaTools-release-aab-${{ github.run_number }}
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: ignore

      # GitHub Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: NaijaTools ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Cleanup
      - name: Cleanup Keystore
        if: always()
        run: rm -f app/keystore.jks
